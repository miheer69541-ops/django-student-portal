<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9ff;
font-family:Segoe UI;
}

.navbar{
background:linear-gradient(90deg,#4b49ac,#6a67ce);
}

.navbar-brand{
color:white;
font-weight:600;
font-size:22px;
}

.hero{
padding:60px;
text-align:center;
background:linear-gradient(135deg,#6a67ce,#98bdff);
color:white;
}

.search-box{
max-width:400px;
margin:auto;
}

.card{
border:none;
border-radius:18px;
overflow:hidden;
transition:0.35s;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.student-img{
height:220px;
object-fit:cover;
}

.card-body{
text-align:center;
}

.badge-custom{
background:#4b49ac;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand">🎓 Student Portal</a>

<a href="/register/" class="btn btn-light">
Register Student
</a>
</div>
</nav>

<div class="hero">
<h1>Student Registration System</h1>
<p>Manage and explore all registered students</p>

<div class="search-box mt-4">
<input class="form-control" placeholder="Search students...">
</div>

</div>

<div class="container mt-5">

<div class="row">

{% for student in students %}

<div class="col-lg-4 col-md-6 mb-4">

<div class="card">

<img src="{{ student.image.url }}" class="card-img-top student-img">

<div class="card-body">

<h5>{{ student.name }}</h5>

<span class="badge badge-custom text-white mb-2">
Student
</span>

<p class="text-muted">{{ student.email }}</p>

<p>📞 {{ student.phone }}</p>

<p class="small text-muted">
{{ student.address }}
</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
