<!DOCTYPE html>
<html>
<head>

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#5f5bd7,#8f94fb);
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

.container-box{
width:900px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
display:flex;
}

.left-side{
background:linear-gradient(135deg,#4b49ac,#98bdff);
color:white;
width:40%;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
text-align:center;
}

.left-side h2{
font-weight:600;
}

.left-side p{
opacity:0.9;
}

.right-side{
width:60%;
padding:40px;
}

.form-control{
border-radius:10px;
padding:10px;
}

.btn-register{
background:#4b49ac;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:500;
transition:0.3s;
}

.btn-register:hover{
background:#3937a7;
}

.back-btn{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container-box">

<div class="left-side">

<h2>Welcome 👋</h2>

<p>
Register students.
</p>

</div>

<div class="right-side">

<h3 class="mb-4">Student Registration</h3>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label>Name</label>
{{ form.name }}
</div>

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label>Phone</label>
{{ form.phone }}
</div>

<div class="mb-3">
<label>Address</label>
{{ form.address }}
</div>

<div class="mb-3">
<label>Upload Image</label>
{{ form.image }}
</div>

<button class="btn-register">
Register Student
</button>

<a href="/" class="btn btn-outline-secondary w-100 back-btn">
Back to Home
</a>

</form>

</div>

</div>

</body>
</html>
